# On-prem MongoDB for local checkout API + Mongo-backed benchmarks.
#
# Default: data in tmpfs (RAM) — survives restarts of the container only; re-run seed after
# `docker compose up`. Use this when you want minimal disk use or hit "no space left on device"
# on Docker volumes. For persistent data on disk, comment tmpfs and uncomment `volumes:` below.
#
# Usage (from this directory):
#   docker compose up -d
#   export MONGODB_URI=mongodb://127.0.0.1:27017 MONGODB_DB=orderbuddy_bench
#   python scripts/seed_mongo_benchmark.py
#   python scripts/benchmark_checkout_mongo.py --json-out openapi/performance_results_mongo.json

services:
  mongo:
    image: mongo:7
    container_name: orderbuddy-mongo-bench
    ports:
      - "27017:27017"
    tmpfs:
      - /data/db
    # Persistent disk (optional — remove tmpfs above when using this):
    # volumes:
    #   - mongo_bench_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: orderbuddy_bench
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

# Uncomment when using the persistent volume above:
# volumes:
#   mongo_bench_data:
